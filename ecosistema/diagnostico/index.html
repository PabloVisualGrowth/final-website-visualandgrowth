  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.clouds.min.js"></script>
  <script>
    if(window.VANTA && window.THREE){
      VANTA.CLOUDS({el:"#clouds",mouseControls:true,touchControls:true,gyroControls:false,
        minHeight:200,minWidth:200,skyColor:0x844340,cloudShadowColor:0x502d18,sunColor:0xdaff18});
    }
    var sun=document.getElementById("sun"),warm=document.getElementById("warm");
    if(sun){sun.style.left="60%";sun.style.top="28%";sun.style.opacity="0.7";}
    if(warm){warm.style.background="radial-gradient(60% 55% at 60% 28%, rgba(255,196,90,.20), transparent 70%)";}
  </script>
